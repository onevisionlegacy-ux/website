<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Vision Legacy</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: #050505;
    color: #ffffff;
    overflow: hidden;
}

.video-intro {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: #000000;
    opacity: 1;
    transition: opacity 2s ease;
}

.video-intro video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.video-intro.hidden {
    opacity: 0;
    pointer-events: none;
}

.opening-page {
    min-height: 100vh;
    opacity: 0;
    transition: opacity 2.2s ease;
    display: flex;
    flex-direction: column;
    background: radial-gradient(circle at top, #1f1f1f 0%, #050505 70%);
}

.opening-page.show {
    opacity: 1;
}

.nav {
    width: min(1100px, 92vw);
    margin: 0 auto;
    padding: 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

.brand {
    color: #ffffff;
    text-decoration: none;
    font-weight: 700;
    letter-spacing: 1px;
}

.menu {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
}

.menu a {
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    opacity: 0.9;
}

.navbar {
    width: min(1100px, 92vw);
    margin: 0 auto;
    padding: 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
}

.logo img {
    width: 150px;
    height: auto;
    display: block;
}

.hero {
    width: min(1100px, 92vw);
    margin: auto;
    padding: 20px 0 60px;
    display: grid;
    grid-template-columns: 1fr minmax(220px, 420px);
    gap: 30px;
    align-items: center;
}

.hero-left p {
    margin: 0 0 10px;
    letter-spacing: 1px;
}

.line-one {
    font-size: clamp(1.15rem, 2vw, 1.45rem);
    color: #f11515;
}

.line-two {
    font-size: clamp(2rem, 5vw, 3.7rem);
    color: #ffffff;
}

.line-three {
    font-size: clamp(1.7rem, 4vw, 3rem);
    color: #ffffff;
}

.line-two strong,
.line-three strong {
    font-weight: 800;
}

.hero-right {
    display: flex;
    justify-content: center;
}

.hero-right img {
    width: min(100%, 380px);
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
}

.actions {
    margin-top: 30px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.actions a {
    text-decoration: none;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 700;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.btn-learn {
    background: #f11515;
    color: #ffffff;
}

.btn-join {
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.28);
    background: rgba(255, 255, 255, 0.04);
}

.actions a:hover {
    transform: translateY(-2px);
    opacity: 0.92;
}

@media (max-width: 700px) {
    .navbar {
        flex-direction: column;
        align-items: flex-start;
    }

    .hero {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="video-intro" id="videoIntro">
    <video id="introVideo" autoplay muted playsinline>
        <source src="intro 3.mpv" type="video/mp4">
        Your browser does not support this intro video.
    </video>
</div>

<main class="opening-page" id="openingPage">
<!-- NAVIGATION -->
<div class="navbar">
    <div class="logo">
        <a href="homepage.html">
            <img src="logo.png" alt="One Vision Legacy">
        </a>
    </div>

    <div class="menu">
        <a href="aboutus.html">Team</a>
        <a href="services.html">Services</a>
        <a href="career.html">Career</a>
        <a href="news.html">News</a>
        <a href="contactus.html">Contact Us</a>
    </div>
</div>

    <section class="hero">
        <div class="hero-left">
            <p class="line-one">One Vision Legacy is...</p>
            <p class="line-two">THE <strong>KEY</strong></p>
            <p class="line-three">TO <strong>SUCCESS</strong></p>

            <div class="actions">
                <a class="btn-learn" href="homepage.html">Learn More</a>
                <a class="btn-join" href="contactus.html">Join Us</a>
            </div>
        </div>
        <div class="hero-right">
            <img src="introphoto.png" alt="Intro image">
        </div>
    </section>
</main>

<script>
const introWrap = document.getElementById("videoIntro");
const introVideo = document.getElementById("introVideo");
const openingPage = document.getElementById("openingPage");

function showOpeningPage() {
    if (introWrap.classList.contains("hidden")) return;
    introWrap.classList.add("hidden");
    openingPage.classList.add("show");
}

introVideo.addEventListener("ended", showOpeningPage);

// Fallback if the video cannot autoplay or load properly.
setTimeout(showOpeningPage, 7000);
</script>
</body>
</html>
