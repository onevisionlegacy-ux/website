<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Vision Legacy</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #212121 0%, #060606 70%);
    color: #ffffff;
    display: grid;
    place-items: center;
    overflow: hidden;
}

.opening {
    width: min(980px, 93vw);
    min-height: 72vh;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
    padding: 28px 30px 36px;
    position: relative;
    overflow: hidden;
}

.stage {
    height: 100%;
    display: grid;
    grid-template-columns: 1fr minmax(240px, 340px);
    align-items: center;
    gap: 10px;
}

.text-zone {
    position: relative;
    min-height: 350px;
}

.line {
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translate(-40px, -50%);
    width: max-content;
    max-width: min(100%, 600px);
    margin: 0;
    opacity: 0;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ffffff;
    text-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
    transition: transform 1.25s ease, opacity 1.25s ease;
}

.line.one {
    top: 30%;
    font-size: clamp(1rem, 2.2vw, 1.45rem);
}

.line.two {
    top: 47%;
    font-size: clamp(1.8rem, 5vw, 3.6rem);
    font-weight: 800;
    letter-spacing: 3px;
}

.line.three {
    top: 64%;
    font-size: clamp(1.5rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: 2.5px;
}

.opening.intro .line {
    opacity: 1;
}

.opening.intro .line.one {
    transform: translate(-520px, -50%);
}

.opening.intro .line.two {
    transform: translate(-470px, -50%);
}

.opening.intro .line.three {
    transform: translate(-460px, -50%);
}

.opening.outro .line {
    transform: translate(-40px, -50%);
    opacity: 0;
}

.key-zone {
    position: relative;
    z-index: 3;
    display: grid;
    place-items: center;
}

.key-core {
    width: min(90%, 300px);
    filter: drop-shadow(0 0 24px rgba(255, 207, 72, 0.6));
}

.buttons {
    position: absolute;
    left: 46px;
    bottom: 34px;
    display: none;
    flex-wrap: wrap;
    gap: 12px;
}

.opening.show-buttons .buttons {
    display: flex;
    animation: fadeUp 0.45s ease-out both;
}

.buttons a {
    text-decoration: none;
    padding: 12px 21px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.28);
    font-weight: 700;
    letter-spacing: 0.4px;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.btn-primary {
    background: #f11515;
    color: #ffffff;
    border-color: transparent;
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.02);
    color: #ffffff;
}

.buttons a:hover {
    transform: translateY(-2px);
    opacity: 0.94;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 900px) {
    .stage {
        grid-template-columns: 1fr;
    }

    .key-zone {
        order: -1;
        margin-top: 16px;
    }

    .text-zone {
        min-height: 250px;
    }

    .opening.intro .line.one {
        transform: translate(-220px, -50%);
    }

    .opening.intro .line.two {
        transform: translate(-210px, -50%);
    }

    .opening.intro .line.three {
        transform: translate(-205px, -50%);
    }

    .buttons {
        left: 30px;
    }
}
</style>
</head>
<body>
<main class="opening" id="opening">
    <section class="stage">
        <div class="text-zone">
            <p class="line one">One Vision Legacy is....</p>
            <p class="line two">The Key,</p>
            <p class="line three">to sucess</p>
        </div>
        <div class="key-zone">
            <img class="key-core" src="key.png" alt="Key image">
        </div>
    </section>
    <nav class="buttons">
        <a class="btn-primary" href="homepage.html">Learn More</a>
        <a class="btn-secondary" href="contactus.html">Contact Us</a>
    </nav>
</main>

<script>
const opening = document.getElementById("opening");
const buttons = Array.from(document.querySelectorAll(".buttons a"));
let isLeaving = false;

function showIntro() {
    opening.classList.add("intro");
    setTimeout(() => {
        opening.classList.add("show-buttons");
    }, 1350);
}

function playOutroAndGo(targetHref) {
    if (isLeaving) return;
    isLeaving = true;
    opening.classList.remove("intro");
    opening.classList.add("outro");
    opening.classList.remove("show-buttons");
    setTimeout(() => {
        window.location.href = targetHref;
    }, 1000);
}

buttons.forEach((button) => {
    button.addEventListener("click", (event) => {
        event.preventDefault();
        playOutroAndGo(button.getAttribute("href"));
    });
});

requestAnimationFrame(showIntro);
</script>
</body>
</html>
