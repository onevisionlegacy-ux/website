<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
    margin: 0;
    background: #0a1f44;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    flex-direction: column;
    text-align: center;
}

img {
    width: 120px;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    margin-top: 20px;
    animation: fadeIn 2.5s ease-in-out;
}

.buttons {
    margin-top: 30px;

.buttons a {
    text-decoration: none;
    padding: 12px 20px;
    margin: 10px;
    background: gold;
    color: black;
    border-radius: 5px;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

</head>
